server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 127.0.0.11 is Docker's embedded DNS server. Using a resolver + variable
    # forces nginx to re-resolve the "backend" service name on every request
    # instead of caching the IP at startup — this survives container restarts
    # and IP changes without requiring a frontend rebuild.
    resolver 127.0.0.11 valid=5s;
    set $backend_upstream http://backend:8000;

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # index.html must never be cached so browsers pick up new bundle hashes after deploys
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS assets have content-hashed names — cache them aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
